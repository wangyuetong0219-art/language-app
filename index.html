<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ZAPP · 单词学习</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Manrope:wght@400;500;600;700&family=Klee+One:wght@400;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FFFBF2;
  --en-front-bg:#F6FFEA;--en-front-text:#C93638;
  --en-back-bg:#C93638;--en-back-text:#FFFFFF;
  --ja-front-bg:#F6FFEA;--ja-front-text:#2B4570;
  --ja-back-bg:#2B4570;--ja-back-text:#F6FFEA;
  --quiz:#62C4DA;
  --ink:#1C1C1C;--sub:#777;--line:#E8DFC8;--white:#fff;
  --danger:#E53935;--green:#4CAF50;
}
html,body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
/* Playfair for section titles / logo only */
.logo,.sec-title,.quiz-title,.mtitle,.deck-end h3{font-family:'Playfair Display',serif}
button{font-family:'Manrope',sans-serif;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
input,textarea,select{font-family:'Manrope',sans-serif}

/* ── Header ── */
header{height:56px;display:flex;align-items:center;padding:0 20px;background:var(--bg);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:200}
.logo{font-size:1.3rem;letter-spacing:-0.5px}

/* ── Tabs ── */
.tab-bar{display:flex;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:56px;z-index:199}
.tab-btn{flex:1;padding:12px 8px;font-size:.85rem;font-weight:600;color:var(--sub);border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.tab-btn.t-en{color:var(--en-back-bg);border-bottom-color:var(--en-back-bg)}
.tab-btn.t-ja{color:var(--ja-back-bg);border-bottom-color:var(--ja-back-bg)}
.tab-btn.t-quiz{color:var(--quiz);border-bottom-color:var(--quiz)}

/* ── Sections ── */
.section{display:none;padding:20px 16px 80px;max-width:680px;margin:0 auto}
.section.active{display:block}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px;flex-wrap:wrap}
.sec-title{font-size:1.4rem}
.hd-btns{display:flex;gap:8px;flex-wrap:wrap}

/* ── Pill buttons ── */
.pill{padding:7px 14px;border-radius:20px;font-size:.8rem;font-weight:600;border:1.5px solid currentColor;transition:background .15s,color .15s}
.pill.en{color:var(--en-back-bg);border-color:var(--en-back-bg)}.pill.en:hover{background:var(--en-back-bg);color:#fff}
.pill.ja{color:var(--ja-back-bg);border-color:var(--ja-back-bg)}.pill.ja:hover{background:var(--ja-back-bg);color:var(--ja-back-text)}
.pill.qz{color:var(--quiz);border-color:var(--quiz)}.pill.qz:hover{background:var(--quiz);color:#fff}

/* ── Filter chips ── */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:16px;font-size:.77rem;font-weight:600;border:1.5px solid var(--line);color:var(--sub);transition:all .15s}
.chip.a-en{background:var(--en-back-bg);border-color:var(--en-back-bg);color:#fff}
.chip.a-ja{background:var(--ja-back-bg);border-color:var(--ja-back-bg);color:var(--ja-back-text)}

/* ── Card nav meta ── */
.nav-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:0 2px}
.nav-count{font-size:.85rem;font-weight:700;color:var(--sub)}
.badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:8px;letter-spacing:.3px}
.b-pri{background:#FCE4EC;color:#880E4F}
.b-new{background:#E3F2FD;color:#1565C0}
.b-due{background:#FFF3E0;color:#E65100}
.meta-btn{font-size:.95rem;padding:5px 8px;border-radius:8px;color:var(--sub);opacity:.45;transition:opacity .15s,background .15s}
.meta-btn.starred{opacity:1}
.meta-btn:hover{opacity:1;background:rgba(0,0,0,.05)}
.meta-btn.del-btn:hover{background:#FFEBEE;color:var(--danger)}
.meta-btn.edit-btn:hover{background:#EDF5FF;color:#1565C0}

/* ── Flash card ── */
.flash-card{border-radius:20px;overflow:hidden;cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,.1);margin-bottom:16px;user-select:none;-webkit-user-select:none}
.flash-card:active{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.flash-face{padding:40px 28px 32px;min-height:215px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px}

.en .flash-front{background:var(--en-front-bg)}
.en .flash-back {background:var(--en-back-bg)}
.ja .flash-front{background:var(--ja-front-bg)}
.ja .flash-back {background:var(--ja-back-bg)}

/* Word text — Playfair for EN, Klee One for JA */
.f-word{font-size:2.4rem;line-height:1.2;word-break:break-word}
.en .f-word{font-family:'Playfair Display',serif;color:var(--en-front-text)}
.ja .f-word{font-family:'Klee One',serif;color:var(--ja-front-text)}

/* EN pos + phonetic row */
.f-en-sub{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.pos-tag{font-family:'Manrope',sans-serif;font-size:.76rem;font-weight:700;padding:2px 9px;border-radius:8px;background:rgba(201,54,56,.12);color:var(--en-front-text);letter-spacing:.3px}
.f-reading{font-size:.95rem;font-weight:500;opacity:.65}
.en .f-reading{color:var(--en-front-text)}

/* Flip hint */
.f-hint{font-size:.72rem;font-weight:600;letter-spacing:.5px;margin-top:2px;opacity:.26}
.en .f-hint{color:var(--en-front-text)}
.ja .f-hint{color:var(--ja-front-text)}

/* Back: meaning uses Noto Serif SC */
.f-meaning{font-family:'Noto Serif SC',serif;font-size:1.25rem;font-weight:700;line-height:1.45;word-break:break-word}
.en .f-meaning{color:var(--en-back-text)}
.ja .f-meaning{color:var(--ja-back-text)}

/* Japanese reading on back — Klee One */
.f-ja-reading{font-family:'Klee One',serif;font-size:1rem;opacity:.8}
.ja .flash-back .f-ja-reading{color:var(--ja-back-text)}

/* Example */
.f-example{font-size:.87rem;line-height:1.65;opacity:.85}
.en .f-example{color:var(--en-back-text)}          /* Manrope inherited */
.ja .f-example{font-family:'Klee One',serif;color:var(--ja-back-text)}

/* ── Nav actions ── */
.nav-actions{display:flex;gap:10px;align-items:center}
.nav-arrow{width:48px;height:48px;border-radius:50%;font-size:1.1rem;font-weight:700;border:1.5px solid var(--line);color:var(--sub);flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.nav-arrow:hover:not(:disabled){border-color:#aaa;color:var(--ink);background:rgba(0,0,0,.03)}
.nav-arrow:disabled{opacity:.22;cursor:default}
.mark-group{display:flex;gap:10px;flex:1}
.mark-btn{flex:1;padding:13px 10px;border-radius:14px;font-size:.88rem;font-weight:700;border:2px solid;transition:all .15s}
.know  {border-color:var(--green);color:var(--green)}.know:hover{background:var(--green);color:#fff}
.unknow{border-color:var(--danger);color:var(--danger)}.unknow:hover{background:var(--danger);color:#fff}

/* ── Deck end / empty ── */
.deck-end{text-align:center;padding:48px 20px}
.deck-end .ei{font-size:2.8rem;margin-bottom:14px}
.deck-end h3{font-size:1.5rem;margin-bottom:8px}
.deck-end .es{color:var(--sub);font-size:.9rem;margin-bottom:24px;line-height:1.8}
.deck-end .es strong{color:var(--ink)}
.empty-state{text-align:center;padding:48px 20px;color:var(--sub)}
.empty-state .ei{font-size:2.5rem;margin-bottom:12px}
.empty-state p{font-size:.9rem;line-height:1.6}
.loading{text-align:center;padding:48px;color:var(--sub);font-size:.9rem}

/* ── Solid buttons ── */
.sbtn{padding:10px 22px;border-radius:22px;font-size:.85rem;font-weight:700;transition:opacity .15s}
.sbtn:hover{opacity:.85}
.sbtn.en-s{background:var(--en-back-bg);color:#fff}
.sbtn.ja-s{background:var(--ja-back-bg);color:var(--ja-back-text)}
.sbtn.qz-s{background:var(--quiz);color:#fff}
.sbtn.gray{background:#E0DDD5;color:var(--ink)}

/* ── Modal (bottom sheet on mobile, centered on desktop) ── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.mbox{background:var(--white);border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 -4px 40px rgba(0,0,0,.15)}
.mhandle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 18px}
.mtitle{font-size:1.15rem;margin-bottom:16px}
.mbody{font-size:.88rem;color:var(--sub);line-height:1.6;margin-bottom:18px}
.mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
@media(min-width:640px){
  .modal{align-items:center;padding:16px}
  .mbox{border-radius:20px;max-height:85vh}
  .mhandle{display:none}
}

/* ── Form ── */
.fg{margin-bottom:13px}
.flabel{display:block;font-size:.75rem;font-weight:700;color:var(--sub);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.finput{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:.9rem;background:var(--bg);color:var(--ink);outline:none;transition:border-color .15s}
.finput:focus{border-color:#999}
.ftarea{width:100%;min-height:130px;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:.85rem;background:var(--bg);color:var(--ink);outline:none;resize:vertical;line-height:1.7;transition:border-color .15s}
.ftarea:focus{border-color:#999}
.fhint{font-size:.75rem;color:var(--sub);margin-top:5px;line-height:1.5}

/* ── Quiz ── */
.quiz-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.quiz-title{font-size:1.4rem}
.qpanel{display:none;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px}
.qpanel.open{display:block}
.qpanel-t{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:14px}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qcard{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:22px 20px 18px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
.qsent{font-size:1.05rem;line-height:1.9;margin-bottom:18px}
.qblank{display:inline-block;min-width:80px;border-bottom:2px solid var(--quiz);color:var(--quiz);font-weight:700;text-align:center;padding:0 6px}
.cword{cursor:pointer;border-bottom:1px dashed #bbb;position:relative;transition:color .15s}.cword:hover{color:var(--quiz)}
.wtip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:.72rem;padding:4px 9px;border-radius:6px;white-space:nowrap;z-index:50;pointer-events:none}
.wtip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--ink)}
.cword:hover .wtip,.cword.tip-on .wtip{display:block}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.obtn{padding:12px 14px;border-radius:12px;font-size:.88rem;font-weight:600;border:2px solid var(--line);color:var(--ink);text-align:left;transition:all .15s;line-height:1.4}
.obtn:hover:not(:disabled){border-color:var(--quiz);color:var(--quiz);background:#F0FAFD}
.obtn.correct{border-color:var(--green);background:#E8F5E9;color:#2E7D32}
.obtn.wrong{border-color:var(--danger);background:#FFEBEE;color:var(--danger)}
.obtn:disabled{cursor:default}
.qfb{display:none;margin-top:12px;padding:10px 14px;border-radius:10px;font-size:.85rem;font-weight:600}
.qfb.show{display:block}.qfb.ok{background:#E8F5E9;color:#2E7D32}.qfb.ng{background:#FFEBEE;color:var(--danger)}
.qsel{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:.9rem;background:var(--bg);color:var(--ink);outline:none}

/* ── Toast ── */
.toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:.85rem;font-weight:600;padding:10px 20px;border-radius:20px;z-index:1000;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{display:block}

/* ── Tags ── */
.card-tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;padding:0 2px}
.ctag{font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:10px;background:#EFECE4;color:#6B6257;cursor:pointer;transition:background .13s}
.ctag:hover{background:#E3DFD6}
.tag-filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.tag-filter-label{font-size:.72rem;font-weight:700;color:var(--sub);letter-spacing:.4px;flex-shrink:0}
.tag-chip{padding:4px 11px;border-radius:14px;font-size:.73rem;font-weight:600;border:1.5px solid #D4CFBF;color:#6B6257;background:var(--bg);transition:all .15s}
.tag-chip:hover{background:#E3DFD6}
.tag-chip.a-tag{background:#6B6257;border-color:#6B6257;color:#fff}
.tag-box{border:1.5px solid var(--line);border-radius:10px;padding:7px 10px;background:var(--bg);display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-height:44px;cursor:text;transition:border-color .15s}
.tag-box:focus-within{border-color:#999}
.tag-pills-wrap{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.tag-edit-pill{display:inline-flex;align-items:center;gap:2px;font-size:.78rem;font-weight:600;padding:2px 5px 2px 9px;border-radius:10px;background:#E8E4DA;color:#555}
.tag-rm{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;font-size:.7rem;cursor:pointer;line-height:1;background:none;border:none;color:#888;border-radius:50%;flex-shrink:0}
.tag-rm:hover{background:rgba(0,0,0,.12);color:#333}
.tag-ti{border:none;outline:none;font-family:'Manrope',sans-serif;font-size:.88rem;background:transparent;flex:1;min-width:80px;height:24px}
.tag-sugg-box{display:flex;flex-wrap:wrap;gap:5px;padding:5px 2px 2px;margin-top:3px}
.tag-sugg-item{font-size:.75rem;font-weight:600;padding:3px 9px;border-radius:10px;background:#F0EDE5;color:var(--sub);cursor:pointer}
.tag-sugg-item:hover{background:#E3DFD6;color:var(--ink)}

@media(max-width:480px){.qopts,.opt-grid{grid-template-columns:1fr}.f-word{font-size:1.9rem}}
</style>
</head>
<body>

<header><span class="logo">ZAPP</span></header>

<div class="tab-bar">
  <button class="tab-btn t-en" onclick="switchTab('en')">英语单词</button>
  <button class="tab-btn"       onclick="switchTab('ja')">日语单词</button>
  <button class="tab-btn"       onclick="switchTab('quiz')">选词题</button>
</div>

<!-- ══ EN ══ -->
<div id="sec-en" class="section active">
  <div class="sec-hd">
    <h2 class="sec-title">英语单词</h2>
    <div class="hd-btns">
      <button class="pill en" onclick="openAddModal('en')">+ 添加</button>
      <button class="pill en" onclick="openModal('m-en-imp')">批量导入</button>
    </div>
  </div>
  <div class="filter-row" id="fr-en">
    <button class="chip a-en" onclick="setFilter('en','all',this)">全部</button>
    <button class="chip" onclick="setFilter('en','starred',this)">⭐ 收藏</button>
    <button class="chip" onclick="setFilter('en','due',this)">待复习</button>
    <button class="chip" onclick="setFilter('en','priority',this)">不认识</button>
  </div>
  <div id="tfr-en" class="tag-filter-row"></div>
  <div id="ca-en"><div class="loading">加载中…</div></div>
</div>

<!-- ══ JA ══ -->
<div id="sec-ja" class="section">
  <div class="sec-hd">
    <h2 class="sec-title">日语单词</h2>
    <div class="hd-btns">
      <button class="pill ja" onclick="openAddModal('ja')">+ 添加</button>
      <button class="pill ja" onclick="openModal('m-ja-imp')">批量导入</button>
    </div>
  </div>
  <div class="filter-row" id="fr-ja">
    <button class="chip a-ja" onclick="setFilter('ja','all',this)">全部</button>
    <button class="chip" onclick="setFilter('ja','starred',this)">⭐ 收藏</button>
    <button class="chip" onclick="setFilter('ja','due',this)">待复习</button>
    <button class="chip" onclick="setFilter('ja','priority',this)">不认识</button>
  </div>
  <div id="tfr-ja" class="tag-filter-row"></div>
  <div id="ca-ja"><div class="loading">加载中…</div></div>
</div>

<!-- ══ QUIZ ══ -->
<div id="sec-quiz" class="section">
  <div class="quiz-hd">
    <h2 class="quiz-title">选词题</h2>
    <button class="pill qz" onclick="toggleAddQuiz()">+ 添加</button>
  </div>
  <div id="add-quiz-panel" class="qpanel">
    <div class="qpanel-t">添加新题目</div>
    <div class="fg"><label class="flabel">句子（用 ___ 表示空格）</label><input id="q-sent" class="finput" type="text" placeholder="She ___ the piano every evening."></div>
    <div class="fg">
      <label class="flabel">四个选项</label>
      <div class="opt-grid">
        <input id="q-o1" class="finput" type="text" placeholder="选项 A">
        <input id="q-o2" class="finput" type="text" placeholder="选项 B">
        <input id="q-o3" class="finput" type="text" placeholder="选项 C">
        <input id="q-o4" class="finput" type="text" placeholder="选项 D">
      </div>
    </div>
    <div class="fg">
      <label class="flabel">正确答案</label>
      <select id="q-cor" class="qsel">
        <option value="0">选项 A</option><option value="1">选项 B</option>
        <option value="2">选项 C</option><option value="3">选项 D</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
      <button class="sbtn gray" onclick="toggleAddQuiz()">取消</button>
      <button class="sbtn qz-s" onclick="addQuizQ()">添加</button>
    </div>
  </div>
  <div id="quiz-list"></div>
</div>

<!-- ══ MODALS ══ -->

<!-- EN Add -->
<div id="m-en-add" class="modal" onclick="bdClose(event,'m-en-add')">
  <div class="mbox">
    <div class="mhandle"></div>
    <div class="mtitle">添加英语单词</div>
    <div class="fg"><label class="flabel">单词 *</label><input id="en-w" class="finput" type="text" placeholder="abandon"></div>
    <div class="fg"><label class="flabel">词性</label><input id="en-pos" class="finput" type="text" placeholder="n. / v. / adj. / adv."></div>
    <div class="fg"><label class="flabel">音标</label><input id="en-r" class="finput" type="text" placeholder="/əˈbændən/"></div>
    <div class="fg"><label class="flabel">中文意思 *</label><input id="en-m" class="finput" type="text" placeholder="放弃"></div>
    <div class="fg"><label class="flabel">例句</label><input id="en-e" class="finput" type="text" placeholder="She abandoned her plan."></div>
    <div class="fg">
      <label class="flabel">标签</label>
      <div class="tag-box">
        <div id="tp-en-add" class="tag-pills-wrap"></div>
        <input id="ti-en-add" class="tag-ti" placeholder="输入标签，回车确认" onkeydown="tagKey(event,'en-add')" oninput="tagInput(this.value,'en-add')">
      </div>
      <div id="ts-en-add" class="tag-sugg-box" style="display:none"></div>
    </div>
    <div class="mfoot">
      <button class="sbtn gray" onclick="closeModal('m-en-add')">取消</button>
      <button class="sbtn en-s" onclick="addWord('en')">添加</button>
    </div>
  </div>
</div>

<!-- EN Import -->
<div id="m-en-imp" class="modal" onclick="bdClose(event,'m-en-imp')">
  <div class="mbox">
    <div class="mhandle"></div>
    <div class="mtitle">批量导入英语单词</div>
    <div class="fg">
      <textarea id="en-imp-txt" class="ftarea" placeholder="每行一个单词，格式：
单词｜词性｜音标｜中文意思｜例句（可选）

abandon｜v.｜/əˈbændən/｜放弃｜She abandoned her plan.
eloquent｜adj.｜/ˈeləkwənt/｜雄辩的｜She gave an eloquent speech.

词性可省略：abandon｜｜/əˈbændən/｜放弃"></textarea>
      <p class="fhint">用「｜」或「|」分隔，词性和例句均可省略。</p>
    </div>
    <div class="mfoot">

<script>
const SUPA_URL = 'https://yrscvkupavfbgeewxoek.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlyc2N2a3VwYXZmYmdlZXd4b2VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjQyNzgsImV4cCI6MjA5NzAwMDI3OH0._ZsWUzC2aDI9J2M7eR3d4xLE1V_1N0rdrXmFXeoCmjw';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── State ───────────────────────────────────────────────────
const allWords = { en:[], ja:[] };
const allTags  = { en:[], ja:[] };
const ctxTags  = {};
const nav = {
  en:{ deck:[], idx:0, flipped:false, filter:'all', tagFilter:null, sKnown:0, sUnknown:0 },
  ja:{ deck:[], idx:0, flipped:false, filter:'all', tagFilter:null, sKnown:0, sUnknown:0 }
};
let delId=null, delLang=null, editId=null, editLang=null;

// ── Tabs ────────────────────────────────────────────────────
function switchTab(t) {

// ── Load words ──────────────────────────────────────────────
async function loadWords(lang, resetSession) {
  const {data,error} = await db.from('words').select('*').eq('lang',lang).order('created_at',{ascending:false});
  if(error){
    document.getElementById('ca-'+lang).innerHTML='<div class="empty-state"><div class="ei">⚠️</div><p>加载失败，请刷新重试</p></div>';
    return;
  }
  allWords[lang] = data||[];
  collectTags(lang);
  renderTagFilterRow(lang);
  buildDeck(lang, resetSession!==false);
  renderCard(lang);
}

// ── Build deck ──────────────────────────────────────────────
function buildDeck(lang, reset) {
  const f=nav[lang].filter, tf=nav[lang].tagFilter, now=Date.now();
  let d=allWords[lang];
  if(f==='starred')   d=d.filter(w=>w.starred);
  else if(f==='due')  d=d.filter(w=>!w.due_at||new Date(w.due_at)<=now);
  else if(f==='priority') d=d.filter(w=>w.priority);
  if(tf) d=d.filter(w=>w.tags&&w.tags.includes(tf));

  nav[lang].deck=[...d].sort((a,b)=>{
    const sc=w=>w.priority?0:(!w.last_practiced?1:(!w.due_at||new Date(w.due_at)<=now?2:3));
    return sc(a)-sc(b);
  });

  if(reset){ nav[lang].idx=0; nav[lang].flipped=false; nav[lang].sKnown=0; nav[lang].sUnknown=0; }
  else if(nav[lang].idx>nav[lang].deck.length) nav[lang].idx=nav[lang].deck.length;
}

// ── Render one-card view ────────────────────────────────────
function renderCard(lang) {
  const area=document.getElementById('ca-'+lang);
  const n=nav[lang];

  if(!n.deck.length){
    const mp={
      all:['📖','还没有单词，点击「+ 添加」或「批量导入」开始吧'],
      starred:['⭐','还没有收藏的单词'],
      due:['✅','目前没有待复习的单词'],
      priority:['💪','没有标记为「不认识」的单词']
    };
    const [ic,msg]=mp[n.filter]||mp.all;
    area.innerHTML=`<div class="empty-state"><div class="ei">${ic}</div><p>${msg}</p></div>`;
    return;
  }

  if(n.idx>=n.deck.length){
    const cs=lang==='en'?'en-s':'ja-s';
    area.innerHTML=`<div class="deck-end">
      <div class="ei">🎉</div><h3>全部完成！</h3>
      <div class="es">共 <strong>${n.deck.length}</strong> 个 &nbsp;·&nbsp; 认识 <strong>${n.sKnown}</strong> &nbsp;·&nbsp; 不认识 <strong>${n.sUnknown}</strong></div>
      <button class="sbtn ${cs}" onclick="restartDeck('${lang}')">从头再来</button>
    </div>`;
    return;
  }

  const w=n.deck[n.idx], now=Date.now();
  let badge='';
  if(w.priority)            badge='<span class="badge b-pri">不认识</span>';
  else if(!w.last_practiced)badge='<span class="badge b-new">新词</span>';
  else if(!w.due_at||new Date(w.due_at)<=now) badge='<span class="badge b-due">待复习</span>';

  const isF=n.flipped;
  const si=w.starred?'⭐':'☆', sc=w.starred?' starred':'';
  const pd=n.idx===0?' disabled':'', nd=n.idx>=n.deck.length-1?' disabled':'';

  // ── Front content ──
  let front;
  if(lang==='en'){
    const sub=(w.pos||w.reading)?`<div class="f-en-sub">
      ${w.pos?`<span class="pos-tag">${esc(w.pos)}</span>`:''}
      ${w.reading?`<span class="f-reading">${esc(w.reading)}</span>`:''}
    </div>`:'';
    front=`<div class="f-word">${esc(w.word)}</div>${sub}<div class="f-hint">点击翻转查看释义</div>`;
  } else {
    // Japanese front: word only, no reading
    front=`<div class="f-word">${esc(w.word)}</div><div class="f-hint">点击翻转查看释义</div>`;
  }

  // ── Back content ──
  let back;
  if(lang==='ja'){
    // Japanese back: reading + meaning + example
    back=`${w.reading?`<div class="f-ja-reading">${esc(w.reading)}</div>`:''}
      <div class="f-meaning">${esc(w.meaning)}</div>
      ${w.example?`<div class="f-example">${esc(w.example)}</div>`:''}`;
  } else {
    back=`<div class="f-meaning">${esc(w.meaning)}</div>
      ${w.example?`<div class="f-example">${esc(w.example)}</div>`:''}`;
  }

  area.innerHTML=`
    <div class="nav-meta">
      <span class="nav-count">${n.idx+1} / ${n.deck.length}</span>
      ${badge}
      <div style="margin-left:auto;display:flex;gap:2px">
        <button class="meta-btn${sc}" onclick="starCurrent('${lang}')">${si}</button>
        <button class="meta-btn edit-btn" onclick="editCurrent('${lang}')" title="编辑">✎</button>
        <button class="meta-btn del-btn"  onclick="delCurrent('${lang}')"  title="删除">✕</button>
      </div>
    </div>

    <div class="flash-card ${lang}" onclick="flipCard('${lang}')">
      <div id="ff-${lang}" class="flash-face flash-front"${isF?' style="display:none"':''}>
        ${front}
      </div>
      <div id="fb-${lang}" class="flash-face flash-back"${isF?'':' style="display:none"'}>
        ${back}
      </div>
    </div>

    ${(w.tags&&w.tags.length)?`<div class="card-tag-row">${w.tags.map(t=>`<span class="ctag" onclick="setTagFilter('${lang}','${esc(t)}')">${esc(t)}</span>`).join('')}</div>`:''}

    <div class="nav-actions">
      <button class="nav-arrow" onclick="prevCard('${lang}')"${pd}>←</button>
      <div class="mark-group">
        <button class="mark-btn unknow" onclick="markNext('${lang}','${w.id}',false)">不认识</button>
        <button class="mark-btn know"   onclick="markNext('${lang}','${w.id}',true)">认识 ✓</button>
      </div>
      <button class="nav-arrow" onclick="nextCard('${lang}')"${nd}>→</button>
    </div>`;
}

// ── Flip (direct DOM, no innerHTML rebuild = no bug) ────────
function flipCard(lang){
  nav[lang].flipped=!nav[lang].flipped;
  const ff=document.getElementById('ff-'+lang), fb=document.getElementById('fb-'+lang);
  if(ff&&fb){ ff.style.display=nav[lang].flipped?'none':''; fb.style.display=nav[lang].flipped?'':'none'; }
}

// ── Navigation ──────────────────────────────────────────────
function nextCard(lang){ const n=nav[lang]; n.flipped=false; if(n.idx<n.deck.length) n.idx++; renderCard(lang); }
function prevCard(lang){ const n=nav[lang]; if(n.idx>0){n.idx--;n.flipped=false;renderCard(lang);} }
function restartDeck(lang){ const n=nav[lang]; n.idx=0;n.flipped=false;n.sKnown=0;n.sUnknown=0; renderCard(lang); }

// ── Mark & advance ──────────────────────────────────────────
async function markNext(lang,id,known){
  const due=new Date(Date.now()+(known?3:1)*86400000).toISOString();
  await db.from('words').update({priority:!known,due_at:due,last_practiced:new Date().toISOString()}).eq('id',id);
  [allWords[lang],nav[lang].deck].forEach(arr=>{
    const w=arr.find(x=>x.id===id);
    if(w){w.priority=!known;w.due_at=due;w.last_practiced=new Date().toISOString();}
  });
  if(known) nav[lang].sKnown++; else nav[lang].sUnknown++;
  showToast(known?'认识 ✓，3天后复习':'不认识，明天再复习');
  nextCard(lang);
}

// ── Star ────────────────────────────────────────────────────
async function starCurrent(lang){
  const w=nav[lang].deck[nav[lang].idx]; if(!w) return;
  const v=!w.starred;
  await db.from('words').update({starred:v}).eq('id',w.id);
  const wa=allWords[lang].find(x=>x.id===w.id); if(wa) wa.starred=v;
  w.starred=v; renderCard(lang);
}

// ── Delete ──────────────────────────────────────────────────
function delCurrent(lang){
  const w=nav[lang].deck[nav[lang].idx]; if(!w) return;
  delId=w.id; delLang=lang;
  document.getElementById('del-confirm-btn').onclick=execDelete;
  openModal('m-del');
}
async function execDelete(){
  if(!delId) return;
  const lang=delLang;
  await db.from('words').delete().eq('id',delId);
  closeModal('m-del'); delId=null; delLang=null;
  showToast('已删除');

}

// ── Edit ────────────────────────────────────────────────────
function editCurrent(lang){
  const w=nav[lang].deck[nav[lang].idx]; if(!w) return;
  editId=w.id; editLang=lang;
  document.getElementById('edit-title').textContent = lang==='en'?'编辑英语单词':'编辑日语单词';
  document.getElementById('edit-w').value = w.word||'';
  document.getElementById('edit-r').value = w.reading||'';
  document.getElementById('edit-m').value = w.meaning||'';
  document.getElementById('edit-e').value = w.example||'';
  document.getElementById('edit-r-label').textContent = lang==='en'?'音标':'读音（假名）';

  const posRow=document.getElementById('edit-pos-row');
  if(lang==='en'){ posRow.style.display=''; document.getElementById('edit-pos').value=w.pos||''; }
  else            posRow.style.display='none';

  document.getElementById('edit-save-btn').className=`sbtn ${lang==='en'?'en-s':'ja-s'}`;
  initTagCtx('edit', w.tags||[]);

}

async function saveEdit(){
  const word   =document.getElementById('edit-w').value.trim();
  const reading=document.getElementById('edit-r').value.trim();
  const meaning=document.getElementById('edit-m').value.trim();

// ── Filter ──────────────────────────────────────────────────
function setFilter(lang,f,el){
  nav[lang].filter=f;
  document.getElementById('fr-'+lang).querySelectorAll('.chip').forEach(c=>c.classList.remove('a-en','a-ja'));
  el.classList.add(lang==='en'?'a-en':'a-ja');

// ── Add single word ─────────────────────────────────────────
async function addWord(lang){
  const word   =document.getElementById(lang+'-w').value.trim();
  const reading=document.getElementById(lang+'-r').value.trim();
  const meaning=document.getElementById(lang+'-m').value.trim();
  const example=document.getElementById(lang+'-e').value.trim();
  const pos    =lang==='en'?document.getElementById('en-pos').value.trim():'';
  const ti     =document.getElementById('ti-'+lang+'-add');
  if(ti&&ti.value.trim()) addTag(lang+'-add',ti.value);
  const tags   =ctxTags[lang+'-add']||[];
  if(!word||!meaning){showToast('请填写单词和中文意思');return;}
  const row={lang,word,reading,meaning,example,pos,tags,starred:false,priority:false,due_at:null,last_practiced:null};
  const {error}=await db.from('words').insert(row);
  if(error){showToast('添加失败：'+error.message);return;}
  ['w','r','m','e'].forEach(k=>document.getElementById(lang+'-'+k).value='');
  if(lang==='en') document.getElementById('en-pos').value='';
  initTagCtx(lang+'-add',[]);
  closeModal('m-'+lang+'-add');
  showToast('已添加「'+word+'」');
  await loadWords(lang,false);
}

// ── Bulk import ─────────────────────────────────────────────
async function importWords(lang){
  const raw=document.getElementById(lang+'-imp-txt').value.trim();
  if(!raw){showToast('请先输入内容');return;}
  const rows=[];
  for(const line of raw.split('\n').filter(l=>l.trim())){
    const p=line.split(/[｜|]/).map(s=>s.trim());
    if(p.length<2) continue;
    let row;
    if(lang==='en'){
      // EN: word | pos | phonetic | meaning | example  (flexible, 2–5 cols)
      if(p.length===2)      row={lang,word:p[0],pos:'',reading:'',meaning:p[1],example:''};
      else if(p.length===3) row={lang,word:p[0],pos:'',reading:p[1],meaning:p[2],example:''};
      else if(p.length===4) row={lang,word:p[0],pos:p[1],reading:p[2],meaning:p[3],example:''};
      else                  row={lang,word:p[0],pos:p[1],reading:p[2],meaning:p[3],example:p[4]||''};
    } else {
      // JA: word | reading | meaning | example
      if(p.length===2)      row={lang,word:p[0],pos:'',reading:'',meaning:p[1],example:''};
      else if(p.length===3) row={lang,word:p[0],pos:'',reading:p[1],meaning:p[2],example:''};
      else                  row={lang,word:p[0],pos:'',reading:p[1],meaning:p[2],example:p[3]||''};
    }
    row.starred=false;row.priority=false;row.due_at=null;row.last_practiced=null;
    rows.push(row);
  }
  if(!rows.length){showToast('未识别到有效数据，请检查格式');return;}
  const {error}=await db.from('words').insert(rows);
  if(error){showToast('导入失败：'+error.message);return;}
  document.getElementById(lang+'-imp-txt').value='';
  closeModal('m-'+lang+'-imp');
  showToast(`成功导入 ${rows.length} 个单词`);
  await loadWords(lang,false);
}

// ── Quiz ────────────────────────────────────────────────────
const QUIZ_BI=[
  {s:"Despite her busy schedule, she always manages to ___ time for her family.",
   wm:{Despite:"尽管",busy:"忙碌的",schedule:"日程",manages:"设法",time:"时间",family:"家人"},
   opts:["make","do","take","find"],cor:3,bi:true},
  {s:"The scientist's discovery had a profound ___ on modern medicine.",
   wm:{profound:"深远的",discovery:"发现",modern:"现代",medicine:"医学"},
   opts:["affect","impact","effect","influence"],cor:1,bi:true},
  {s:"It is essential that all employees ___ the new safety regulations.",
   wm:{essential:"至关重要的",employees:"员工",safety:"安全",regulations:"规定"},
   opts:["follow","obey","comply with","adhere"],cor:2,bi:true}
];
const qSt={qs:[]};

async function loadQuiz(){
  const {data}=await db.from('quiz_questions').select('*').order('created_at',{ascending:false});
  const uq=(data||[]).map(q=>({s:q.sentence,wm:{},opts:JSON.parse(q.options),cor:q.correct_index,bi:false,id:q.id}));
  qSt.qs=[...QUIZ_BI,...uq]; renderQuiz();
}
function renderQuiz(){
  const c=document.getElementById('quiz-list');
  if(!qSt.qs.length){c.innerHTML='<div class="empty-state"><div class="ei">📝</div><p>还没有题目</p></div>';return;}
  c.innerHTML=qSt.qs.map((q,i)=>renderQCard(q,i)).join('');
}
function renderQCard(q,i){
  const mk=txt=>txt.split(/(\s+)/).map(t=>{
    if(!t.trim()) return t;
    const cl=t.replace(/[^a-zA-Z']/g,''); if(!cl) return esc(t);
    const zh=q.wm[cl]||q.wm[t.trim()]||'';
    return `<span class="cword" onclick="tipToggle(this,'${esc(zh||cl)}')">${esc(t)}<span class="wtip"></span></span>`;
  }).join('');
  const pts=q.s.split('___');
  const sent=mk(pts[0]||'')+`<span class="qblank" id="qb${i}">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>`+mk(pts[1]||'');
  const opts=q.opts.map((o,oi)=>`<button class="obtn" id="qo${i}_${oi}" onclick="pickOpt(${i},${oi})">${esc(o)}</button>`).join('');
  const del=q.bi?'':`<div style="margin-top:10px"><button class="pill qz" style="font-size:.72rem;padding:4px 10px" onclick="delQuiz('${q.id}')">删除</button></div>`;
  return `<div class="qcard"><div class="qsent">${sent}</div><div class="qopts">${opts}</div><div id="qf${i}" class="qfb"></div>${del}</div>`;
}
function tipToggle(el,zh){ el.classList.toggle('tip-on'); const t=el.querySelector('.wtip'); if(t) t.textContent=zh; }
function pickOpt(qi,oi){
  const q=qSt.qs[qi];
  for(let k=0;k<q.opts.length;k++){const b=document.getElementById(`qo${qi}_${k}`);if(b)b.disabled=true;}
  const ok=oi===q.cor;
  const s=document.getElementById(`qo${qi}_${oi}`), c=document.getElementById(`qo${qi}_${q.cor}`);
  if(s)s.classList.add(ok?'correct':'wrong'); if(!ok&&c)c.classList.add('correct');
  const bl=document.getElementById('qb'+qi); if(bl)bl.textContent=q.opts[q.cor];
  const fb=document.getElementById('qf'+qi); fb.className='qfb show '+(ok?'ok':'ng');
  fb.textContent=ok?'✓ 正确！':'✗ 正确答案是：'+q.opts[q.cor];
}
function toggleAddQuiz(){ document.getElementById('add-quiz-panel').classList.toggle('open'); }
async function addQuizQ(){
  const s=document.getElementById('q-sent').value.trim();
  const opts=['q-o1','q-o2','q-o3','q-o4'].map(id=>document.getElementById(id).value.trim());
  const cor=parseInt(document.getElementById('q-cor').value);
  if(!s||opts.some(o=>!o)){showToast('请填写句子和所有选项');return;}
  if(!s.includes('___')){showToast('句子中请用 ___ 表示空格');return;}
  const {error}=await db.from('quiz_questions').insert({sentence:s,options:JSON.stringify(opts),correct_index:cor,blank_index:0});
  if(error){showToast('添加失败：'+error.message);return;}
  ['q-sent','q-o1','q-o2','q-o3','q-o4'].forEach(id=>document.getElementById(id).value='');
  toggleAddQuiz(); showToast('添加成功'); await loadQuiz();
}
async function delQuiz(id){
  if(!confirm('确认删除这道题目？'))return;
  await db.from('quiz_questions').delete().eq('id',id);
  showToast('已删除'); await loadQuiz();
}

// ── Tags ────────────────────────────────────────────────────
function openAddModal(lang){
  initTagCtx(lang+'-add',[]);
  openModal('m-'+lang+'-add');
}

function collectTags(lang){
  const set=new Set();
  allWords[lang].forEach(w=>(w.tags||[]).forEach(t=>set.add(t)));
  allTags[lang]=[...set].sort();
}

function renderTagFilterRow(lang){
  const row=document.getElementById('tfr-'+lang);
  if(!row) return;
  const tags=allTags[lang], tf=nav[lang].tagFilter;
  if(!tags.length){ row.innerHTML=''; return; }
  row.innerHTML=`<span class="tag-filter-label">标签：</span>`
    +tags.map(t=>`<button class="tag-chip${tf===t?' a-tag':''}" onclick="setTagFilter('${lang}','${esc(t)}')">${esc(t)}</button>`).join('')
    +(tf?`<button class="tag-chip" style="opacity:.6" onclick="clearTagFilter('${lang}')">× 全部</button>`:'');
}

function setTagFilter(lang,tag){
  nav[lang].tagFilter = nav[lang].tagFilter===tag ? null : tag;
  renderTagFilterRow(lang);
  buildDeck(lang,true); renderCard(lang);
}

function clearTagFilter(lang){
  nav[lang].tagFilter=null;
  renderTagFilterRow(lang);
  buildDeck(lang,true); renderCard(lang);
}

function initTagCtx(ctx, tags){
  ctxTags[ctx]=[...tags];
  renderTagPills(ctx);
  const ti=document.getElementById('ti-'+ctx);
  if(ti) ti.value='';
  hideSugg(ctx);
}

function renderTagPills(ctx){
  const box=document.getElementById('tp-'+ctx);
  if(!box) return;
  box.innerHTML=(ctxTags[ctx]||[]).map((t,i)=>`<span class="tag-edit-pill">${esc(t)}<button class="tag-rm" onclick="rmTag('${ctx}',${i})">✕</button></span>`).join('');
}

function rmTag(ctx,idx){
  if(!ctxTags[ctx]) return;
  ctxTags[ctx].splice(idx,1);
  renderTagPills(ctx);
}

function addTag(ctx,tag){
  tag=tag.trim().replace(/,|，/g,'').trim();
  if(!tag) return;
  if(!ctxTags[ctx]) ctxTags[ctx]=[];
  if(!ctxTags[ctx].includes(tag)) ctxTags[ctx].push(tag);
  renderTagPills(ctx);
  const ti=document.getElementById('ti-'+ctx);
  if(ti) ti.value='';
  hideSugg(ctx);
}

function tagKey(e,ctx){
  if(e.isComposing||e.keyCode===229) return;
  if(e.key==='Enter'||e.key===','||e.key==='，'){
    e.preventDefault();
    const ti=document.getElementById('ti-'+ctx);
    if(ti&&ti.value.trim()) addTag(ctx,ti.value);
  } else if(e.key==='Backspace'){
    const ti=document.getElementById('ti-'+ctx);
    if(ti&&!ti.value&&ctxTags[ctx]&&ctxTags[ctx].length){
      ctxTags[ctx].pop();
      renderTagPills(ctx);
    }
  }
}

function tagInput(val,ctx){
  const sbox=document.getElementById('ts-'+ctx);
  if(!sbox) return;
  val=val.trim();
  if(!val){ sbox.style.display='none'; sbox.innerHTML=''; return; }
  const existing=ctxTags[ctx]||[];
  const pool=[...new Set([...allTags.en,...allTags.ja])];
  const sugg=pool.filter(t=>t.toLowerCase().includes(val.toLowerCase())&&!existing.includes(t));
  if(!sugg.length){ sbox.style.display='none'; sbox.innerHTML=''; return; }
  sbox.style.display='flex';
  sbox.innerHTML=sugg.map(t=>`<span class="tag-sugg-item" onclick="addTag('${ctx}','${esc(t)}')">${esc(t)}</span>`).join('');
}

function hideSugg(ctx){
  const sbox=document.getElementById('ts-'+ctx);
  if(sbox){ sbox.style.display='none'; sbox.innerHTML=''; }
}

// ── Util ────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ────────────────────────────────────────────────────
Promise.all([loadWords('en',true), loadWords('ja',true), loadQuiz()]);
</script>
