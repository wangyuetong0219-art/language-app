<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ZAPP · 单词学习</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ─── Reset & Base ─────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #FFFBF2;
  --en-front-bg: #F6FFEA;
  --en-front-text: #C93638;
  --en-back-bg: #C93638;
  --en-back-text: #FFFFFF;
  --ja-front-bg: #F6FFEA;
  --ja-front-text: #2B4570;
  --ja-back-bg: #2B4570;
  --ja-back-text: #F6FFEA;
  --quiz-accent: #62C4DA;
  --ink: #1C1C1C;
  --sub: #777;
  --line: #E8DFC8;
  --white: #FFFFFF;
  --danger: #E53935;
  --gold: #F5A623;
}

html, body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

h1, h2, h3, .logo-text {
  font-family: 'Playfair Display', serif;
}

button {
  font-family: 'Manrope', sans-serif;
  cursor: pointer;
  border: none;
  background: none;
  -webkit-tap-highlight-color: transparent;
}

input, textarea, select {
  font-family: 'Manrope', sans-serif;
}

/* ─── Header ────────────────────────────────────────────── */
header {
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 200;
}

.logo-text {
  font-size: 1.3rem;
  color: var(--ink);
  letter-spacing: -0.5px;
}

/* ─── Tab Bar ───────────────────────────────────────────── */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  position: sticky;
  top: 56px;
  z-index: 199;
}

.tab-btn {
  flex: 1;
  padding: 12px 8px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--sub);
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  letter-spacing: 0.2px;
}

.tab-btn.active-en {
  color: var(--en-back-bg);
  border-bottom-color: var(--en-back-bg);
}

.tab-btn.active-ja {
  color: var(--ja-back-bg);
  border-bottom-color: var(--ja-back-bg);
}

.tab-btn.active-quiz {
  color: var(--quiz-accent);
  border-bottom-color: var(--quiz-accent);
}

/* ─── Sections ──────────────────────────────────────────── */
.section {
  display: none;
  padding: 20px 16px 80px;
  max-width: 680px;
  margin: 0 auto;
}

.section.active {
  display: block;
}

/* ─── Section Header Row ────────────────────────────────── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 8px;
  flex-wrap: wrap;
}

.section-title {
  font-size: 1.4rem;
  color: var(--ink);
}

.header-btns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ─── Pill Buttons ──────────────────────────────────────── */
.pill-btn {
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  border: 1.5px solid currentColor;
  transition: background 0.15s, color 0.15s;
}

.pill-btn.en-primary {
  color: var(--en-back-bg);
  border-color: var(--en-back-bg);
}
.pill-btn.en-primary:hover, .pill-btn.en-primary.active {
  background: var(--en-back-bg);
  color: #fff;
}

.pill-btn.ja-primary {
  color: var(--ja-back-bg);
  border-color: var(--ja-back-bg);
}
.pill-btn.ja-primary:hover, .pill-btn.ja-primary.active {
  background: var(--ja-back-bg);
  color: var(--ja-back-text);
}

.pill-btn.quiz-primary {
  color: var(--quiz-accent);
  border-color: var(--quiz-accent);
}
.pill-btn.quiz-primary:hover, .pill-btn.quiz-primary.active {
  background: var(--quiz-accent);
  color: #fff;
}

/* ─── Word Card ─────────────────────────────────────────── */
.card-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.word-card {
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  position: relative;
}

/* Front face */
.card-front {
  padding: 18px 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.en .card-front { background: var(--en-front-bg); }
.ja .card-front { background: var(--ja-front-bg); }

.card-word {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  line-height: 1.2;
}

.en .card-word { color: var(--en-front-text); }
.ja .card-word { color: var(--ja-front-text); }

.card-reading {
  font-size: 0.8rem;
  font-weight: 500;
  opacity: 0.65;
}

.en .card-reading { color: var(--en-front-text); }
.ja .card-reading { color: var(--ja-front-text); }

/* Back face */
.card-back {
  display: none;
  padding: 14px 16px;
  flex-direction: column;
  gap: 6px;
}

.card-back.visible {
  display: flex;
}

.en .card-back { background: var(--en-back-bg); color: var(--en-back-text); }
.ja .card-back { background: var(--ja-back-bg); color: var(--ja-back-text); }

.card-meaning {
  font-size: 1rem;
  font-weight: 600;
  line-height: 1.4;
}

.card-example {
  font-size: 0.8rem;
  font-weight: 400;
  opacity: 0.85;
  line-height: 1.5;
}

/* Card action row */
.card-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-top: 1px solid rgba(0,0,0,0.06);
  flex-wrap: wrap;
}

.en .card-actions { background: var(--en-front-bg); }
.ja .card-actions { background: var(--ja-front-bg); }

.en .card-back + .card-actions { background: var(--en-back-bg); border-top-color: rgba(255,255,255,0.2); }
.ja .card-back + .card-actions { background: var(--ja-back-bg); border-top-color: rgba(255,255,255,0.2); }

.action-btn {
  padding: 5px 11px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 600;
  border: 1.5px solid;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}

.btn-flip-en {
  border-color: var(--en-back-bg);
  color: var(--en-back-bg);
}
.btn-flip-en:hover { background: var(--en-back-bg); color: #fff; }

.btn-flip-ja {
  border-color: var(--ja-back-bg);
  color: var(--ja-back-bg);
}
.btn-flip-ja:hover { background: var(--ja-back-bg); color: var(--ja-back-text); }

.btn-flip-back-en {
  border-color: rgba(255,255,255,0.7);
  color: rgba(255,255,255,0.9);
}
.btn-flip-back-en:hover { background: rgba(255,255,255,0.2); }

.btn-flip-back-ja {
  border-color: rgba(246,255,234,0.7);
  color: rgba(246,255,234,0.9);
}
.btn-flip-back-ja:hover { background: rgba(246,255,234,0.2); }

.btn-know {
  border-color: #4CAF50;
  color: #4CAF50;
}
.btn-know:hover { background: #4CAF50; color: #fff; }

.btn-unknow {
  border-color: var(--danger);
  color: var(--danger);
}
.btn-unknow:hover { background: var(--danger); color: #fff; }

.star-btn {
  margin-left: auto;
  font-size: 1.1rem;
  line-height: 1;
  padding: 4px;
  opacity: 0.5;
  transition: opacity 0.15s, transform 0.15s;
}
.star-btn.starred { opacity: 1; }
.star-btn:hover { transform: scale(1.2); }

.delete-btn {
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 0.7rem;
  color: var(--sub);
  opacity: 0.4;
  padding: 4px 6px;
  border-radius: 6px;
  transition: opacity 0.15s, background 0.15s;
  z-index: 10;
}
.delete-btn:hover { opacity: 1; background: rgba(229,57,53,0.1); color: var(--danger); }

/* Due / Priority badge */
.due-badge {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 8px;
  letter-spacing: 0.3px;
}
.due-badge.due-now { background: #FFF3E0; color: #E65100; }
.due-badge.new-word { background: #E3F2FD; color: #1565C0; }
.due-badge.priority { background: #FCE4EC; color: #880E4F; }

/* ─── Empty State ───────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--sub);
}
.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.9rem; line-height: 1.6; }

/* ─── Import Panel ──────────────────────────────────────── */
.panel {
  display: none;
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 16px;
}
.panel.open { display: block; }

.panel-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  margin-bottom: 10px;
}

.panel textarea {
  width: 100%;
  min-height: 100px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px;
  font-size: 0.82rem;
  resize: vertical;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  outline: none;
}
.panel textarea:focus { border-color: #aaa; }

.panel-hint {
  font-size: 0.75rem;
  color: var(--sub);
  margin-top: 6px;
  line-height: 1.5;
}

.panel-footer {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  justify-content: flex-end;
}

.solid-btn {
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 700;
  transition: opacity 0.15s;
}
.solid-btn:hover { opacity: 0.85; }

.solid-btn.en-solid { background: var(--en-back-bg); color: #fff; }
.solid-btn.ja-solid { background: var(--ja-back-bg); color: var(--ja-back-text); }
.solid-btn.quiz-solid { background: var(--quiz-accent); color: #fff; }
.solid-btn.gray-solid { background: #E0DDD5; color: var(--ink); }

/* ─── Practice Session ──────────────────────────────────── */
.practice-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 300;
  overflow-y: auto;
}
.practice-overlay.open { display: block; }

.practice-inner {
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

.practice-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.practice-progress {
  font-size: 0.85rem;
  color: var(--sub);
  font-weight: 600;
}

.close-practice-btn {
  font-size: 0.85rem;
  color: var(--sub);
  padding: 6px 12px;
  border-radius: 10px;
  border: 1px solid var(--line);
  transition: background 0.15s;
}
.close-practice-btn:hover { background: var(--line); }

/* Practice card */
.practice-card {
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  margin-bottom: 20px;
}

.practice-front {
  padding: 40px 24px 28px;
  text-align: center;
  min-height: 180px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.en .practice-front { background: var(--en-front-bg); }
.ja .practice-front { background: var(--ja-front-bg); }

.practice-word {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  line-height: 1.2;
}
.en .practice-word { color: var(--en-front-text); }
.ja .practice-word { color: var(--ja-front-text); }

.practice-reading {
  font-size: 0.9rem;
  font-weight: 500;
  opacity: 0.6;
}
.en .practice-reading { color: var(--en-front-text); }
.ja .practice-reading { color: var(--ja-front-text); }

.practice-back {
  display: none;
  padding: 20px 24px 24px;
  flex-direction: column;
  gap: 8px;
}
.practice-back.visible { display: flex; }

.en .practice-back { background: var(--en-back-bg); color: var(--en-back-text); }
.ja .practice-back { background: var(--ja-back-bg); color: var(--ja-back-text); }

.practice-meaning {
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1.4;
}
.practice-example {
  font-size: 0.85rem;
  opacity: 0.85;
  line-height: 1.6;
}

.practice-btns {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.big-btn {
  flex: 1;
  min-width: 100px;
  padding: 14px 20px;
  border-radius: 14px;
  font-size: 0.9rem;
  font-weight: 700;
  border: 2px solid;
  transition: background 0.15s, color 0.15s;
}

.big-btn.flip-en { border-color: var(--en-back-bg); color: var(--en-back-bg); }
.big-btn.flip-en:hover { background: var(--en-back-bg); color: #fff; }
.big-btn.flip-ja { border-color: var(--ja-back-bg); color: var(--ja-back-bg); }
.big-btn.flip-ja:hover { background: var(--ja-back-bg); color: var(--ja-back-text); }

.big-btn.know { border-color: #4CAF50; color: #4CAF50; }
.big-btn.know:hover { background: #4CAF50; color: #fff; }
.big-btn.unknow { border-color: var(--danger); color: var(--danger); }
.big-btn.unknow:hover { background: var(--danger); color: #fff; }

/* ─── Summary Screen ────────────────────────────────────── */
.summary-screen {
  display: none;
  text-align: center;
  padding: 40px 20px;
}
.summary-screen.visible { display: block; }
.summary-title {
  font-size: 1.8rem;
  margin-bottom: 24px;
}
.summary-stats {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 32px;
}
.stat-box {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px 24px;
  min-width: 100px;
}
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
}
.stat-label {
  font-size: 0.75rem;
  color: var(--sub);
  font-weight: 600;
  margin-top: 4px;
}

/* ─── Daily limit bar ───────────────────────────────────── */
.limit-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  font-size: 0.8rem;
  color: var(--sub);
  font-weight: 600;
}
.limit-track {
  flex: 1;
  height: 6px;
  background: var(--line);
  border-radius: 3px;
  overflow: hidden;
}
.limit-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s;
}
.en-fill { background: var(--en-back-bg); }
.ja-fill { background: var(--ja-back-bg); }

/* ─── Filter Row ────────────────────────────────────────── */
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.filter-chip {
  padding: 5px 12px;
  border-radius: 16px;
  font-size: 0.77rem;
  font-weight: 600;
  border: 1.5px solid var(--line);
  color: var(--sub);
  transition: all 0.15s;
}
.filter-chip.active-en {
  background: var(--en-back-bg);
  border-color: var(--en-back-bg);
  color: #fff;
}
.filter-chip.active-ja {
  background: var(--ja-back-bg);
  border-color: var(--ja-back-bg);
  color: var(--ja-back-text);
}

/* ─── Modal / Dialog ────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open {
  display: flex;
}
.modal-box {
  background: var(--white);
  border-radius: 18px;
  padding: 28px 24px 20px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
}
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  margin-bottom: 10px;
}
.modal-body {
  font-size: 0.88rem;
  color: var(--sub);
  line-height: 1.6;
  margin-bottom: 20px;
}
.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

/* ─── Quiz Section ──────────────────────────────────────── */
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.quiz-title { font-size: 1.4rem; }

.quiz-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 24px 20px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  margin-bottom: 16px;
}

.quiz-sentence {
  font-size: 1.05rem;
  line-height: 1.8;
  margin-bottom: 20px;
  color: var(--ink);
}

.quiz-blank {
  display: inline-block;
  min-width: 80px;
  border-bottom: 2px solid var(--quiz-accent);
  color: var(--quiz-accent);
  font-weight: 700;
  text-align: center;
  padding: 0 6px;
}

.clickable-word {
  cursor: pointer;
  border-bottom: 1px dashed #aaa;
  position: relative;
  transition: color 0.15s;
}
.clickable-word:hover { color: var(--quiz-accent); }

.word-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: #fff;
  font-size: 0.72rem;
  padding: 4px 8px;
  border-radius: 6px;
  white-space: nowrap;
  z-index: 50;
  pointer-events: none;
}
.word-tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: var(--ink);
}
.clickable-word:hover .word-tooltip,
.clickable-word.show-tip .word-tooltip { display: block; }

.quiz-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.option-btn {
  padding: 12px 14px;
  border-radius: 12px;
  font-size: 0.88rem;
  font-weight: 600;
  border: 2px solid var(--line);
  color: var(--ink);
  text-align: left;
  transition: all 0.15s;
  line-height: 1.4;
}
.option-btn:hover:not(:disabled) {
  border-color: var(--quiz-accent);
  color: var(--quiz-accent);
  background: #F0FAFD;
}
.option-btn.correct {
  border-color: #4CAF50;
  background: #E8F5E9;
  color: #2E7D32;
}
.option-btn.wrong {
  border-color: var(--danger);
  background: #FFEBEE;
  color: var(--danger);
}
.option-btn:disabled { cursor: default; }

.quiz-feedback {
  display: none;
  margin-top: 14px;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 0.85rem;
  font-weight: 600;
  line-height: 1.5;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.right { background: #E8F5E9; color: #2E7D32; }
.quiz-feedback.wrong-fb { background: #FFEBEE; color: var(--danger); }

.quiz-nav {
  display: flex;
  justify-content: flex-end;
  margin-top: 12px;
}

/* Add quiz form */
.add-quiz-form {
  display: none;
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 16px;
}
.add-quiz-form.open { display: block; }

.form-group {
  margin-bottom: 12px;
}
.form-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--sub);
  margin-bottom: 5px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.form-input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-size: 0.88rem;
  background: var(--bg);
  color: var(--ink);
  outline: none;
}
.form-input:focus { border-color: var(--quiz-accent); }

.option-inputs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.correct-select {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-size: 0.88rem;
  background: var(--bg);
  color: var(--ink);
  outline: none;
}
.correct-select:focus { border-color: var(--quiz-accent); }

/* ─── Toast ─────────────────────────────────────────────── */
.toast {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 50%;

<!-- ════════════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════════════ -->
<script>
// ─── Supabase Init ──────────────────────────────────────────
const SUPABASE_URL = 'https://yrscvkupavfbgeewxoek.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlyc2N2a3VwYXZmYmdlZXd4b2VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjQyNzgsImV4cCI6MjA5NzAwMDI3OH0._ZsWUzC2aDI9J2M7eR3d4xLE1V_1N0rdrXmFXeoCmjw';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── State ──────────────────────────────────────────────────
const DAILY_LIMIT = 20;

const state = {
  en: { words: [], filter: 'all', todayCount: 0 },
  ja: { words: [], filter: 'all', todayCount: 0 },
  quiz: { questions: [], currentIdx: 0, answered: false }
};

const practice = {
  lang: 'en',
  queue: [],
  idx: 0,
  knownCount: 0,
  unknownCount: 0,
  flipped: false
};

let pendingDeleteId = null;
let pendingDeleteLang = null;

// ─── Tab Switching ──────────────────────────────────────────
const tabBtns = document.querySelectorAll('.tab-btn');
const sections = document.querySelectorAll('.section');

function switchTab(tab) {
  sections.forEach(s => s.classList.remove('active'));
  tabBtns.forEach(b => {
    b.classList.remove('active-en','active-ja','active-quiz');
  });
  document.getElementById('section-'+tab).classList.add('active');
  const idx = ['en','ja','quiz'].indexOf(tab);
  tabBtns[idx].classList.add('active-'+tab);
}

// ─── Panel Toggle ───────────────────────────────────────────
function togglePanel(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

// ─── Toast ──────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Today's Date Key ───────────────────────────────────────
function todayKey() {
  return new Date().toISOString().slice(0,10);
}

// ─── Load Words ─────────────────────────────────────────────
async function loadWords(lang) {
  const { data, error } = await db
    .from('words')
    .select('*')
    .eq('lang', lang)
    .order('created_at', { ascending: false });

  if (error) { console.error(error); return; }

  // Sort: priority first, then by due date
  const now = Date.now();
  const sorted = (data || []).sort((a, b) => {
    const ap = a.priority ? 1 : 0, bp = b.priority ? 1 : 0;
    if (ap !== bp) return bp - ap;
    const ad = a.due_at ? new Date(a.due_at).getTime() : 0;
    const bd = b.due_at ? new Date(b.due_at).getTime() : 0;
    return ad - bd;
  });

  state[lang].words = sorted;

  // Count today's practice
  const todayStr = todayKey();
  const todayPracticed = sorted.filter(w => w.last_practiced && w.last_practiced.startsWith(todayStr)).length;
  state[lang].todayCount = todayPracticed;

  renderWordList(lang);
  updateLimitBar(lang);
}

// ─── Update Limit Bar ───────────────────────────────────────
function updateLimitBar(lang) {
  const count = state[lang].todayCount;
  const pct = Math.min(100, (count / DAILY_LIMIT) * 100);
  document.getElementById(lang+'-limit-text').textContent = `今日: ${count}/${DAILY_LIMIT}`;
  document.getElementById(lang+'-limit-fill').style.width = pct + '%';
}

// ─── Render Word List ───────────────────────────────────────
function renderWordList(lang) {
  const container = document.getElementById(lang+'-card-list');
  const filter = state[lang].filter;
  const now = Date.now();

  let words = state[lang].words;
  if (filter === 'starred') words = words.filter(w => w.starred);
  else if (filter === 'due') words = words.filter(w => !w.due_at || new Date(w.due_at).getTime() <= now);
  else if (filter === 'priority') words = words.filter(w => w.priority);

  if (words.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${filter==='starred'?'⭐':'📖'}</div>
      <p>${filter==='starred'?'还没有收藏的单词':'暂无单词，点击「导入」添加吧'}</p>
    </div>`;
    return;
  }

  container.innerHTML = words.map(w => renderCard(w, lang)).join('');
}

function renderCard(w, lang) {
  const now = Date.now();
  const isDue = !w.due_at || new Date(w.due_at).getTime() <= now;
  const isNew = !w.last_practiced;
  let badge = '';
  if (w.priority) badge = '<span class="due-badge priority">不认识</span>';
  else if (isNew) badge = '<span class="due-badge new-word">新词</span>';
  else if (isDue) badge = '<span class="due-badge due-now">待复习</span>';

  const starClass = w.starred ? 'starred' : '';
  const starIcon = w.starred ? '⭐' : '☆';

  const flipFrontClass = lang==='en' ? 'btn-flip-en' : 'btn-flip-ja';
  const flipBackClass = lang==='en' ? 'btn-flip-back-en' : 'btn-flip-back-ja';

  return `<div class="word-card ${lang}" id="card-${w.id}">
    <button class="delete-btn" onclick="confirmDelete('${w.id}','${lang}')">✕</button>
    <div class="card-front">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span class="card-word">${escHtml(w.word)}</span>
        ${badge}
      </div>
      ${w.reading ? `<div class="card-reading">${escHtml(w.reading)}</div>` : ''}
    </div>
    <div id="back-${w.id}" class="card-back">
      <div class="card-meaning">${escHtml(w.meaning)}</div>
      ${w.example ? `<div class="card-example">${escHtml(w.example)}</div>` : ''}
    </div>
    <div id="actions-${w.id}" class="card-actions">
      <button class="action-btn ${flipFrontClass}" id="flip-btn-${w.id}" onclick="flipCard('${w.id}','${lang}')">查看释义</button>
      <button class="action-btn btn-know" id="know-btn-${w.id}" onclick="markKnow('${w.id}','${lang}')" style="display:none">认识 ✓</button>
      <button class="action-btn btn-unknow" id="unknow-btn-${w.id}" onclick="markUnknow('${w.id}','${lang}')" style="display:none">不认识</button>
      <button class="star-btn ${starClass}" onclick="toggleStar('${w.id}','${lang}')">${starIcon}</button>
    </div>
  </div>`;
}

// ─── Flip Card ──────────────────────────────────────────────
function flipCard(id, lang) {
  const back = document.getElementById('back-'+id);
  const flipBtn = document.getElementById('flip-btn-'+id);
  const knowBtn = document.getElementById('know-btn-'+id);
  const unknowBtn = document.getElementById('unknow-btn-'+id);
  const actions = document.getElementById('actions-'+id);

  if (!back.classList.contains('visible')) {
    back.classList.add('visible');
    flipBtn.textContent = '收起';
    flipBtn.className = `action-btn ${lang==='en' ? 'btn-flip-back-en' : 'btn-flip-back-ja'}`;
    // adjust actions background when back is shown
    const nextSibling = back.nextElementSibling;
    if (nextSibling && nextSibling.id === 'actions-'+id) {
      nextSibling.style.background = lang==='en' ? 'var(--en-back-bg)' : 'var(--ja-back-bg)';
      nextSibling.style.borderTopColor = 'rgba(255,255,255,0.2)';
    }
    knowBtn.style.display = 'inline-flex';
    unknowBtn.style.display = 'inline-flex';
  } else {
    back.classList.remove('visible');
    flipBtn.textContent = '查看释义';
    flipBtn.className = `action-btn ${lang==='en' ? 'btn-flip-en' : 'btn-flip-ja'}`;
    const nextSibling = back.nextElementSibling;
    if (nextSibling) {
      nextSibling.style.background = '';
      nextSibling.style.borderTopColor = '';
    }
    knowBtn.style.display = 'none';
    unknowBtn.style.display = 'none';
  }
}

// ─── Mark Know / Unknown ────────────────────────────────────
async function markKnow(id, lang) {
  const dueAt = new Date(Date.now() + 3*24*60*60*1000).toISOString();
  await db.from('words').update({
    priority: false,
    due_at: dueAt,
    last_practiced: new Date().toISOString()
  }).eq('id', id);
  showToast('已标记为认识，3天后复习');
  await loadWords(lang);
}

async function markUnknow(id, lang) {
  const dueAt = new Date(Date.now() + 1*24*60*60*1000).toISOString();
  await db.from('words').update({
    priority: true,
    due_at: dueAt,
    last_practiced: new Date().toISOString()
  }).eq('id', id);
  showToast('已标记为不认识，明天再复习');
  await loadWords(lang);
}

// ─── Star Toggle ────────────────────────────────────────────
async function toggleStar(id, lang) {
  const word = state[lang].words.find(w => w.id === id);
  if (!word) return;
  const newVal = !word.starred;
  await db.from('words').update({ starred: newVal }).eq('id', id);
  word.starred = newVal;
  renderWordList(lang);
}

// ─── Filter ─────────────────────────────────────────────────
function setFilter(lang, filter, el) {
  state[lang].filter = filter;
  const row = el.parentElement;
  row.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active-en','active-ja'));
  el.classList.add(lang==='en' ? 'active-en' : 'active-ja');
  renderWordList(lang);
}

// ─── Import Words ───────────────────────────────────────────
async function importWords(lang) {
  const raw = document.getElementById(lang+'-import-text').value.trim();
  if (!raw) { showToast('请先输入内容'); return; }

  const lines = raw.split('\n').filter(l => l.trim());
  const toInsert = [];

  for (const line of lines) {
    const parts = line.split(/[｜|]/).map(p => p.trim());
    if (parts.length < 3) continue;
    toInsert.push({
      lang,
      word: parts[0],
      reading: parts[1] || '',
      meaning: parts[2] || '',
      example: parts[3] || '',
      starred: false,
      priority: false,
      due_at: null,
      last_practiced: null
    });
  }

  if (toInsert.length === 0) {
    showToast('未识别到有效数据，请检查格式');
    return;
  }

  const { error } = await db.from('words').insert(toInsert);
  if (error) { showToast('导入失败：'+error.message); return; }

  document.getElementById(lang+'-import-text').value = '';
  togglePanel(lang+'-import-panel');
  showToast(`成功导入 ${toInsert.length} 个单词`);
  await loadWords(lang);
}

// ─── Delete ─────────────────────────────────────────────────
function confirmDelete(id, lang) {
  pendingDeleteId = id;
  pendingDeleteLang = lang;
  document.getElementById('delete-modal').classList.add('open');
  document.getElementById('confirm-delete-btn').onclick = executeDelete;
}

function closeDeleteModal() {
  document.getElementById('delete-modal').classList.remove('open');
  pendingDeleteId = null;
  pendingDeleteLang = null;
}

async function executeDelete() {
  if (!pendingDeleteId) return;
  const { error } = await db.from('words').delete().eq('id', pendingDeleteId);
  closeDeleteModal();
  if (error) { showToast('删除失败'); return; }
  showToast('已删除');
  await loadWords(pendingDeleteLang);
}

// ─── Practice Session ────────────────────────────────────────
function startPractice(lang) {
  const now = Date.now();
  const words = state[lang].words;

  // Due words + priority words up to DAILY_LIMIT
  let queue = words.filter(w => {
    const due = !w.due_at || new Date(w.due_at).getTime() <= now;
    return due || w.priority;
  }).slice(0, DAILY_LIMIT);

  if (queue.length === 0) {
    showToast('没有需要复习的单词');
    return;
  }

  // Shuffle
  for (let i = queue.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }

  practice.lang = lang;
  practice.queue = queue;
  practice.idx = 0;
  practice.knownCount = 0;
  practice.unknownCount = 0;
  practice.flipped = false;

  // Set color class
  const card = document.getElementById('practice-card');
  card.className = 'practice-card ' + lang;

  // Set flip button class
  const flipBtn = document.getElementById('btn-flip-practice');
  flipBtn.className = lang === 'en' ? 'big-btn flip-en' : 'big-btn flip-ja';

  document.getElementById('summary-screen').classList.remove('visible');
  document.getElementById('practice-card-wrap').style.display = '';
  document.getElementById('practice-overlay').classList.add('open');

  showPracticeCard();
}

function showPracticeCard() {
  const w = practice.queue[practice.idx];
  if (!w) { showSummary(); return; }

  document.getElementById('p-word').textContent = w.word;
  document.getElementById('p-reading').textContent = w.reading || '';
  document.getElementById('p-meaning').textContent = w.meaning || '';
  document.getElementById('p-example').textContent = w.example || '';

  // Reset flip
  document.getElementById('p-back').classList.remove('visible');
  practice.flipped = false;

  const lang = practice.lang;
  const flipBtn = document.getElementById('btn-flip-practice');
  flipBtn.textContent = '翻转看答案';
  flipBtn.style.display = '';

  document.getElementById('practice-btns').innerHTML = `
    <button id="btn-flip-practice" class="big-btn ${lang==='en'?'flip-en':'flip-ja'}" onclick="flipPracticeCard()">翻转看答案</button>
  `;

  document.getElementById('practice-progress').textContent =
    `${practice.idx + 1} / ${practice.queue.length}`;
}

function flipPracticeCard() {
  if (practice.flipped) return;
  practice.flipped = true;

  document.getElementById('p-back').classList.add('visible');

  const lang = practice.lang;
  document.getElementById('practice-btns').innerHTML = `
    <button class="big-btn unknow" onclick="practiceAnswer(false)">不认识</button>
    <button class="big-btn know" onclick="practiceAnswer(true)">认识 ✓</button>
  `;
}

async function practiceAnswer(known) {
  const w = practice.queue[practice.idx];
  if (!w) return;

  if (known) {
    practice.knownCount++;
    const dueAt = new Date(Date.now() + 3*24*60*60*1000).toISOString();
    await db.from('words').update({ priority:false, due_at:dueAt, last_practiced:new Date().toISOString() }).eq('id', w.id);
  } else {
    practice.unknownCount++;
    const dueAt = new Date(Date.now() + 1*24*60*60*1000).toISOString();
    await db.from('words').update({ priority:true, due_at:dueAt, last_practiced:new Date().toISOString() }).eq('id', w.id);
  }

  practice.idx++;
  showPracticeCard();
}

function showSummary() {
  document.getElementById('practice-card-wrap').style.display = 'none';
  document.getElementById('summary-screen').classList.add('visible');
  document.getElementById('sum-total').textContent = practice.queue.length;
  document.getElementById('sum-known').textContent = practice.knownCount;
  document.getElementById('sum-unknown').textContent = practice.unknownCount;

  // Streak: simple calc from localStorage
  const lang = practice.lang;
  const key = 'streak_'+lang;
  const lastKey = 'streak_last_'+lang;
  const today = todayKey();
  const lastDay = localStorage.getItem(lastKey) || '';
  let streak = parseInt(localStorage.getItem(key)||'0');
  if (lastDay === today) {
    // already practiced today, keep streak
  } else {
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    if (lastDay === yesterday) streak++;
    else streak = 1;
    localStorage.setItem(key, streak);
    localStorage.setItem(lastKey, today);
  }
  document.getElementById('sum-streak').textContent = streak;

  const sumBtn = document.getElementById('sum-close-btn');
  sumBtn.className = `solid-btn ${lang==='en'?'en-solid':'ja-solid'}`;

  // Reload word list
  loadWords(lang);
}

function closePractice() {
  document.getElementById('practice-overlay').classList.remove('open');
}

// ─── Quiz Section ────────────────────────────────────────────

    ],

async function loadQuiz() {
  const { data, error } = await db.from('quiz_questions').select('*').order('created_at', {ascending: false});
  const userQuestions = (data || []).map(q => ({
    sentence: q.sentence,
    words: buildWordObjects(q.sentence),
    blank: q.blank_index,
    options: JSON.parse(q.options),
    correct: q.correct_index,
    builtin: false,
    id: q.id
  }));

  state.quiz.questions = [...BUILTIN_QUIZ, ...userQuestions];
  renderQuiz();
}

function buildWordObjects(sentence) {
  return sentence.replace(/___/g, '').split(' ')
    .filter(w => w.trim())
    .map(w => ({word: w, zh: ''}));
}

function renderQuiz() {
  const container = document.getElementById('quiz-list');
  const qs = state.quiz.questions;
  if (qs.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><p>还没有题目</p></div>';
    return;
  }

  container.innerHTML = qs.map((q, i) => renderQuizCard(q, i)).join('');
}

function renderQuizCard(q, idx) {
  const parts = q.sentence.split('___');
  const before = parts[0] || '';
  const after = parts[1] || '';

  // Build clickable sentence
  function makeClickable(text, qIdx) {
    return text.split(' ').map(token => {
      const clean = token.replace(/[^a-zA-Z']/g,'');
      if (!clean) return token + ' ';
      return `<span class="clickable-word" onclick="showWordTip(this,'${clean}')">${token}<span class="word-tooltip" id="tip-${clean}-${qIdx}"></span></span> `;
    }).join('');
  }

  const blankHtml = `<span class="quiz-blank" id="quiz-blank-${idx}">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>`;

  const sentenceHtml = makeClickable(before, idx) + blankHtml + makeClickable(after, idx);

  const optBtns = q.options.map((opt, oi) =>
    `<button class="option-btn" id="opt-${idx}-${oi}" onclick="selectOption(${idx},${oi})">${opt}</button>`
  ).join('');

  const deleteBtn = q.builtin ? '' :
    `<button class="pill-btn quiz-primary" style="font-size:0.72rem;padding:4px 10px;margin-top:8px" onclick="deleteQuiz('${q.id}')">删除</button>`;

  return `<div class="quiz-card" id="quiz-card-${idx}">
    <div class="quiz-sentence">${sentenceHtml}</div>
    <div class="quiz-options">${optBtns}</div>
    <div id="quiz-fb-${idx}" class="quiz-feedback"></div>
    ${deleteBtn}
  </div>`;
}

function showWordTip(el, word) {
  el.classList.toggle('show-tip');
  const tip = el.querySelector('.word-tooltip');
  if (tip && !tip.textContent) {
    tip.textContent = '加载中…';
    translateWord(word).then(zh => { tip.textContent = zh || word; });
  }
}

const zhCache = {};
async function translateWord(word) {
  if (zhCache[word]) return zhCache[word];
  // Simple lookup from quiz questions' words arrays
  for (const q of state.quiz.questions) {
    for (const w of (q.words||[])) {
      if (w.word.toLowerCase() === word.toLowerCase() && w.zh) {
        zhCache[word] = w.zh;
        return w.zh;
      }
    }
  }
  // Fallback: just return the word itself
  zhCache[word] = word;
  return word;
}

function selectOption(qIdx, optIdx) {
  const q = state.quiz.questions[qIdx];
  const fb = document.getElementById('quiz-fb-'+qIdx);
  const blank = document.getElementById('quiz-blank-'+qIdx);

  // Disable all options
  for (let i = 0; i < q.options.length; i++) {
    const btn = document.getElementById(`opt-${qIdx}-${i}`);
    if (btn) btn.disabled = true;
  }

  const isCorrect = optIdx === q.correct;
  const selBtn = document.getElementById(`opt-${qIdx}-${optIdx}`);
  const corrBtn = document.getElementById(`opt-${qIdx}-${q.correct}`);

  if (selBtn) selBtn.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect && corrBtn) corrBtn.classList.add('correct');

  if (blank) blank.textContent = q.options[q.correct];

  fb.className = 'quiz-feedback show ' + (isCorrect ? 'right' : 'wrong-fb');
  fb.textContent = isCorrect ? '✓ 正确！' : `✗ 正确答案是：${q.options[q.correct]}`;
}

function toggleAddQuiz() {
  document.getElementById('add-quiz-form').classList.toggle('open');
}

async function addQuizQuestion() {
  const sentence = document.getElementById('q-sentence').value.trim();
  const opts = [
    document.getElementById('q-opt1').value.trim(),
    document.getElementById('q-opt2').value.trim(),
    document.getElementById('q-opt3').value.trim(),
    document.getElementById('q-opt4').value.trim()
  ];
  const correct = parseInt(document.getElementById('q-correct').value);

  if (!sentence || opts.some(o => !o)) {
    showToast('请填写句子和所有选项');
    return;
  }
  if (!sentence.includes('___')) {
    showToast('句子中请用 ___ 表示空格');
    return;
  }

  const { error } = await db.from('quiz_questions').insert({
    sentence,
    options: JSON.stringify(opts),
    correct_index: correct,
    blank_index: 0
  });

  if (error) { showToast('添加失败：'+error.message); return; }

  ['q-sentence','q-opt1','q-opt2','q-opt3','q-opt4'].forEach(id => {
    document.getElementById(id).value = '';
  });
  toggleAddQuiz();
  showToast('添加成功');
  await loadQuiz();
}

async function deleteQuiz(id) {
  if (!confirm('确认删除这道题目？')) return;
  const { error } = await db.from('quiz_questions').delete().eq('id', id);
  if (error) { showToast('删除失败'); return; }
  showToast('已删除');
  await loadQuiz();
}

// ─── Helpers ─────────────────────────────────────────────────
function escHtml(str) {
  return String(str||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadWords('en'), loadWords('ja'), loadQuiz()]);
}

init();
